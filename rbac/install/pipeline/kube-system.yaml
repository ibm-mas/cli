---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mas:{{ mas_instance_id }}:install-pipeline:kube-system
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mas:{{ mas_instance_id }}:install-pipeline:kube-system
subjects:
  - kind: ServiceAccount
    name: mas-{{ mas_instance_id }}-install-pipeline
    namespace: mas-{{ mas_instance_id }}-pipelines
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mas:{{ mas_instance_id }}:install-pipeline:kube-system
  namespace: kube-system
rules:
  # Some components may need to create secrets in kube-system
  # This is typically for cluster-level configuration
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - create
      - patch
      - update
  # DaemonSets for system-level components (e.g., GPU drivers, monitoring agents)
  - apiGroups:
      - apps
    resources:
      - daemonsets
    verbs:
      - get
      - list
      - create
      - patch
      - update

---
# Grant the install-pipeline service account permission to use pipelines-scc
# This mirrors the RoleBinding that OpenShift Pipelines operator creates for the default pipeline SA
# The pipelines-scc-clusterrole only grants "use" permission for the pipelines-scc SCC - this is minimal RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mas-{{ mas_instance_id }}-pipelines-scc-rolebinding
  namespace: mas-{{ mas_instance_id }}-pipelines
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pipelines-scc-clusterrole
subjects:
  - kind: ServiceAccount
    name: mas-{{ mas_instance_id }}-install-pipeline
    namespace: mas-{{ mas_instance_id }}-pipelines

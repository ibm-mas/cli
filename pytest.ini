[pytest]
pythonpath = "python/src" "python/tests"
testpaths = python/tests
markers =
    unit: Fast unit tests with mocked dependencies
    integration: End-to-end integration tests
    must-gather: Must-gather collection tests (mas-cli must-gather)
    must_gather: Must-gather collection tests (mas-cli must-gather)
    install: Installation tests (mas-cli install)
    aiservice-install: AI Service installation tests (mas-cli aiservice-install)
    aiservice_install: AI Service installation tests (mas-cli aiservice-install)
    mirror: Mirror/catalog tests (mas-cli mirror-*)
    update: Update tests (mas-cli update)
    upgrade: Upgrade tests (mas-cli upgrade)
    cli: CLI utility tests
# Suppress deprecation warnings from third-party halo library
# The halo library uses deprecated setDaemon() instead of daemon attribute
# This is a known issue in halo and cannot be fixed in our code
filterwarnings =
    ignore::DeprecationWarning:halo

---
# Generic FVT Post-Update Task for MAS Applications
# This validates that a MAS application has been successfully updated
#
# Required Variables:
#   - mas_instance_id: MAS instance identifier
#   - app_name: Application name (e.g., 'manage', 'facilities', 'health', etc.)
#   - app_kind: Kubernetes kind for the app (e.g., 'ManageApp', 'FacilitiesApp')
#   - workspace_kind: Kubernetes kind for workspaces (e.g., 'ManageWorkspace', 'FacilitiesWorkspace')
#   - operator_label: Operator label selector (e.g., 'ibm-mas-manage', 'ibm-mas-facilities')


- hosts: localhost
  any_errors_fatal: true
  vars:
    # Default retry/delay values (can be overridden by caller or environment variables)
    # Priority: caller vars > environment vars > defaults
    app_check_retries: "{{ app_check_retries | default(lookup('env', 'APP_CHECK_RETRIES') | default(20, true), true) }}"
    app_check_delay: "{{ app_check_delay | default(lookup('env', 'APP_CHECK_DELAY') | default(120, true), true) }}"
    workspace_version_retries: "{{ workspace_version_retries | default(lookup('env', 'WORKSPACE_VERSION_RETRIES') | default(30, true), true) }}"
    workspace_version_delay: "{{ workspace_version_delay | default(lookup('env', 'WORKSPACE_VERSION_DELAY') | default(120, true), true) }}"
    workspace_ready_retries: "{{ workspace_ready_retries | default(lookup('env', 'WORKSPACE_READY_RETRIES') | default(60, true), true) }}"
    workspace_ready_delay: "{{ workspace_ready_delay | default(lookup('env', 'WORKSPACE_READY_DELAY') | default(120, true), true) }}"
    
  tasks:
    # 1. Validate required variables
    # -----------------------------------------------------------------------------
    - name: "Validate required variables are set"
      assert:
        that:
          - mas_instance_id is defined
          - mas_instance_id | length > 0
          - app_name is defined
          - app_name | length > 0
          - app_kind is defined
          - app_kind | length > 0
          - workspace_kind is defined
          - workspace_kind | length > 0
          - operator_label is defined
          - operator_label | length > 0
        fail_msg: "Required variables are missing. Please provide: mas_instance_id, app_name, app_kind, workspace_kind, operator_label"

    # 2. Check if application workspace exists
    # -----------------------------------------------------------------------------
    - name: "Check if {{ workspace_kind }} exists for {{ app_name }}"
      kubernetes.core.k8s_info:
        kind: "{{ workspace_kind }}"
        namespace: "mas-{{ mas_instance_id }}-{{ app_name }}"
        label_selectors:
          - mas.ibm.com/instanceId={{ mas_instance_id }}
      register: app_ws

    - name: "Set fact: {{ app_name }} exists"
      set_fact:
        app_exists: true
      when:
        - app_ws is defined
        - app_ws.resources is defined
        - app_ws.resources | length > 0

    - name: "Debug: {{ app_name }} existence status"
      debug:
        msg: "{{ app_name }} exists: {{ app_exists | default(false) }}"

    # 3. Perform post-update validation if application exists
    # -----------------------------------------------------------------------------
    - block:
        # 3.1 Lookup the Operator Version
        # -------------------------------------------------------------------------
        - name: "upgrade : Lookup OperatorCondition for {{ app_name }}"
          kubernetes.core.k8s_info:
            api_version: operators.coreos.com/v2
            kind: OperatorCondition
            namespace: "mas-{{ mas_instance_id }}-{{ app_name }}"
            label_selectors:
              - "operators.coreos.com/{{ operator_label }}.mas-{{ mas_instance_id }}-{{ app_name }}"
          register: updated_opcon
          retries: 10
          delay: 120 # 2 minutes
          until:
            - updated_opcon.resources is defined
            - updated_opcon.resources | length == 1
            - updated_opcon.resources[0].metadata.name is defined

        - name: "upgrade : Debug OperatorCondition for {{ app_name }}"
          debug:
            var: updated_opcon

        - name: "upgrade : Lookup operator version for {{ app_name }}"
          set_fact:
            updated_opcon_version: "{{ updated_opcon.resources[0].metadata.name.split('.v')[1] | ibm.mas_devops.format_pre_version_with_buildid }}"

        - name: "upgrade : Debug operator version for {{ app_name }}"
          debug:
            msg: "Operator version for {{ app_name }}: {{ updated_opcon_version }}"

        # 3.2 Check that the Application CR meets the required state
        # -------------------------------------------------------------------------
        - name: "Check if {{ app_kind }} CR is updated to latest version and Ready ({{ app_check_delay }}s delay)"
          kubernetes.core.k8s_info:
            kind: "{{ app_kind }}"
            name: "{{ mas_instance_id }}"
            namespace: "mas-{{ mas_instance_id }}-{{ app_name }}"
          retries: "{{ app_check_retries }}"
          delay: "{{ app_check_delay }}"
          until:
            - updated_app_info.resources is defined
            - updated_app_info.resources[0].status is defined
            - updated_app_info.resources[0].status.versions.reconciled == updated_opcon_version
            - updated_app_info.resources | json_query('[*].status.conditions[?type==`Ready`][].reason') | select ('match','Ready') | list | length == 1
          register: updated_app_info

        - name: "Debug: {{ app_kind }} CR status"
          debug:
            msg: "{{ app_kind }} reconciled version: {{ updated_app_info.resources[0].status.versions.reconciled }}"

        # 3.3 Check that the Application Workspaces meet the required state
        # -------------------------------------------------------------------------
        - name: "Check if {{ workspace_kind }} CR reconciled version is updated to target version ({{ workspace_version_delay }}s delay)"
          kubernetes.core.k8s_info:
            kind: "{{ workspace_kind }}"
            namespace: "mas-{{ mas_instance_id }}-{{ app_name }}"
            label_selectors:
              - mas.ibm.com/instanceId={{ mas_instance_id }}
          retries: "{{ workspace_version_retries }}"
          delay: "{{ workspace_version_delay }}"
          until:
            - app_ws_cr_version.resources is defined
            - app_ws_cr_version.resources[0].status.versions.reconciled == updated_opcon_version
          register: app_ws_cr_version

        - name: "Check if {{ workspace_kind }} CR is Ready ({{ workspace_ready_delay }}s delay)"
          kubernetes.core.k8s_info:
            kind: "{{ workspace_kind }}"
            namespace: "mas-{{ mas_instance_id }}-{{ app_name }}"
            label_selectors:
              - mas.ibm.com/instanceId={{ mas_instance_id }}
          retries: "{{ workspace_ready_retries }}"
          delay: "{{ workspace_ready_delay }}"
          until:
            - app_ws_cr_lookup.resources is defined
            - app_ws_cr_lookup.resources | json_query('[*].status.conditions[?type==`Ready`][].reason') | select ('in', ['Ready', 'WorkspaceReady']) | list | length == app_ws_cr_lookup.resources | length
            - app_ws_cr_lookup.resources | json_query('[*].status.conditions[?type==`Running`][].reason') | select ('in', ['Successful']) | list | length == app_ws_cr_lookup.resources | length
            - app_name != 'manage' or (app_ws_cr_lookup.resources | json_query('[*].status.conditions[?type==`DeploymentCR`][].reason') | select ('in', ['Successful']) | list | length == app_ws_cr_lookup.resources | length)
          register: app_ws_cr_lookup

        - name: "Success: {{ app_name }} post-update validation completed"
          debug:
            msg: "{{ app_name }} has been successfully updated and all workspaces are ready"

      when:
        - app_exists is defined
        - app_exists

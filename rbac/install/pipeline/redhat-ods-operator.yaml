---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mas:{{ mas_instance_id }}:install-pipeline:redhat-ods-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mas:{{ mas_instance_id }}:install-pipeline:redhat-ods-operator
subjects:
  - kind: ServiceAccount
    name: mas-{{ mas_instance_id }}-install-pipeline
    namespace: mas-{{ mas_instance_id }}-pipelines
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mas:{{ mas_instance_id }}:install-pipeline:redhat-ods-operator
rules:
  # RHOAI requires scc patch for workaround to not update PVC settings by operator
  - apiGroups:
      - security.openshift.io
    resources:
      - securitycontextconstraints
    resourceNames:
      - openshift-ai-llminferenceservice-multi-node-scc
      - openshift-ai-llminferenceservice-scc
    verbs:
      - list
      - get
      - patch
      - update

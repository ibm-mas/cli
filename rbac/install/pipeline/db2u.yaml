---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mas:{{ mas_instance_id }}:install-pipeline:db2u
  namespace: db2u
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mas:{{ mas_instance_id }}:install-pipeline:db2u
subjects:
  - kind: ServiceAccount
    name: mas-{{ mas_instance_id }}-install-pipeline
    namespace: mas-{{ mas_instance_id }}-pipelines
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mas:{{ mas_instance_id }}:install-pipeline:db2u
  namespace: db2u
rules:
  # DB2 installation requires namespace management
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - patch
  
  # DB2 operator subscription
  - apiGroups:
      - operators.coreos.com
    resources:
      - installplans
      - operatorgroups
      - subscriptions
    verbs:
      - get
      - list
      - create
      - patch
  
  # DB2 requires secrets for registry credentials and database credentials
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
      - patch
      - delete
  
  # DB2 requires service accounts
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - get
      - create
      - patch
  
  # DB2 instance creation and management
  - apiGroups:
      - db2u.databases.ibm.com
    resources:
      - db2uclusters
    verbs:
      - get
      - create
      - patch
      - list
      - watch
  
  # DB2 requires configmaps
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - create
      - patch
  
  # DB2 requires PVCs
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - get
      - create
      - patch
      - list
  
  # DB2 requires cert-manager issuers and certificates for SSL
  - apiGroups:
      - cert-manager.io
    resources:
      - issuers
      - certificates
    verbs:
      - get
      - create
      - patch
      - list
      - watch

- name: Generate Tekton Pipelines
  hosts: localhost
  any_errors_fatal: true
  vars:
    mas_tekton_version: latest

    params_src_dir: src/params
    params_tmp_dir: tmp

    pipeline_src_dir: src/pipelines
    pipeline_target_dir: target/pipelines

    # Optional: specify a single pipeline to generate (e.g., -e pipeline_name=mas-fvt-launcher)
    pipeline_name: ""

    # Define all pipelines
    all_pipelines:
      # MAS Pipelines
      - mas-backup
      - mas-restore
      - mas-install
      - mas-update
      - mas-upgrade
      - mas-uninstall
      - mas-devops-db2-migration 
      # MAS FVT Pipelines
      - mas-fvt-assist
      - mas-fvt-core
      - mas-fvt-deprovision-after
      - mas-fvt-iot
      - mas-fvt-finally
      - mas-fvt-manage
      - mas-fvt-manage-ai
      - mas-fvt-manage-is
      - mas-fvt-manage-regr
      - mas-fvt-mobile-pytest
      - mas-fvt-mobile-requests
      - mas-fvt-mobile-testng
      - mas-fvt-monitor
      - mas-fvt-optimizer
      - mas-fvt-predict
      - mas-fvt-sls
      - mas-fvt-visualinspection
      - mas-fvt-launcher
      - mas-ivt-manage
      - mas-fvt-facilities
      # AI Service Pipelines
      - aiservice-upgrade
      # AI Service FVT Pipelines
      - aiservice-fvt-launcher
      - aiservice-fvt

    # Determine which pipelines to generate
    pipelines_to_generate: "{{ [pipeline_name] if pipeline_name != '' else all_pipelines }}"

  tasks:

    # 1. Prepare tmp and target directory for the pipeline build
    # -------------------------------------------------------------------------
    - name: Create target directory
      ansible.builtin.file:
        path: "{{ pipeline_target_dir }}"
        state: directory

    # 2. Generate Pipelines
    # -------------------------------------------------------------------------
    - name: Generate Pipelines
      vars:
        wait_for_install: false
      ansible.builtin.template:
        src: "{{ pipeline_src_dir }}/{{ item }}.yml.j2"
        dest: "{{ pipeline_target_dir }}/{{ item }}.yaml"
      with_items: "{{ pipelines_to_generate }}"

    # 3. Generate Gitops Pipelines
    # -------------------------------------------------------------------------
    - name: Generate GitOps Pipelines
      vars:
        wait_for_provision: false
        wait_for_deprovision: false
      ansible.builtin.template:
        src: "{{ pipeline_src_dir }}/gitops/{{ item }}.yml.j2"
        dest: "{{ pipeline_target_dir }}/{{ item }}.yaml"
      with_items:
        - gitops-deprovision-cluster
        - gitops-deprovision-mas-deps
        - deprovision-aiservice-deps
        - gitops-deprovision-mas-instance
        - gitops-deprovision-mas-cluster
        - gitops-provision-bootstrap-cluster
        - gitops-mas-instance
        - gitops-mas-fvt-preparer-pipeline
        - gitops-mas-apps
        - gitops-mas-cluster
        - gitops-mas-deps
        - gitops-aiservice-deps
        - gitops-mas-initiator
        - gitops-suite-license-service
        - gitops-deprovision-suite-license-service
        - gitops-aiservice-pipeline
        - gitops-aiservice-tenant-pipeline
        - gitops-deprovision-aiservice-pipeline
        - gitops-deprovision-aiservice-tenant-pipeline
        - gitops-iac-pipeline
      when: pipeline_name == ''

    # 4. Generate Gitops Pipelines with waits
    # -------------------------------------------------------------------------
    - name: Generate GitOps Pipelines with wait-after-deprovision
      vars:
        wait_for_deprovision: true
      ansible.builtin.template:
        src: "{{ pipeline_src_dir }}/gitops/{{ item }}.yml.j2"
        dest: "{{ pipeline_target_dir }}/{{ item }}-after-deprovision.yaml"
      with_items:
        - gitops-provision-bootstrap-cluster
        - gitops-deprovision-cluster
        - gitops-deprovision-mas-deps
        - deprovision-aiservice-deps
      when: pipeline_name == ''
        

    # 5. Generate Gitops Pipelines with waits
    # -------------------------------------------------------------------------
    - name: Generate GitOps Pipelines with wait-after-provision
      vars:
        wait_for_provision: true
      ansible.builtin.template:
        src: "{{ pipeline_src_dir }}/gitops/{{ item }}.yml.j2"
        dest: "{{ pipeline_target_dir }}/{{ item }}-after-provision.yaml"
      with_items:
        - gitops-mas-deps
        - gitops-mas-initiator
        - gitops-aiservice-deps
      when: pipeline_name == ''

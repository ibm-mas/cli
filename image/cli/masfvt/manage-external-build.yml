---
- hosts: localhost
  any_errors_fatal: true
  vars:
    # Image Pull Policy
    image_pull_policy: "{{ lookup('env', 'IMAGE_PULL_POLICY') }}"
    # MAS Details
    mas_instance_id: "{{ lookup('env', 'MAS_INSTANCE_ID') }}"
    mas_workspace_id: "{{ lookup('env', 'MAS_WORKSPACE_ID') }}"
    # Build namespace — fixed, not configurable
    manage_build_namespace: "manage-build"
    # Pipeline Run Info
    pipelinerun_namespace: "{{ lookup('env', 'PIPELINERUN_NAMESPACE') | default('mas-' ~ mas_instance_id ~ '-pipelines', True) }}"
    service_account_name: "{{ lookup('env', 'SERVICE_ACCOUNT_NAME') | default('pipeline', True) }}"
  tasks:
    - name: "Debug"
      debug:
        msg:
          - "mas_instance_id ............. {{ mas_instance_id }}"
          - "mas_workspace_id ............ {{ mas_workspace_id }}"
          - "manage_build_namespace ...... {{ manage_build_namespace }}"
          - "pipelinerun_namespace ....... {{ pipelinerun_namespace }}"

    - name: "Apply ConfigMap — run.sh"
      kubernetes.core.k8s:
        apply: true
        template: templates/manage-ext-build/configmap-run.yml.j2

    - name: "Apply ConfigMap — build_bc.py"
      kubernetes.core.k8s:
        apply: true
        template: templates/manage-ext-build/configmap-bc.yml.j2

    - name: "Apply Job — manage-external-build"
      kubernetes.core.k8s:
        apply: true
        template: templates/manage-ext-build/job.yml.j2

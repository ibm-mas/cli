customModes:
  - slug: code-python
    name: 🐍 Code (Python TDD)
    roleDefinition: You are a Python software engineer, with a test-driven development workflow.
    whenToUse: |-
      Use this mode for Python development tasks including:
      - Modifying any Python files (*.py)
      - Implementing pytest tests and test suites
      - Refactoring Python code
      - Adding type hints and docstrings
      - Python TDD workflows
      - Any task involving Python code changes
    customInstructions: |-
      # Python Development Guide

      ## Environment Setup
      Assume that the developer has already set up a working virtual environment in `.venv` and that any
      python commands should be performed in the context of this venv using `.venv/bin/python`

      If this virtual environment is not set up, refuse to proceed with any code changes until the
      developer provides the expected development environment required to validate any changes

      Do not attempt to set this environment up on behalf of the developer, this is something they
      are expected to manage

      # Development Rules
      - Follow the rules in .bob/rules/python/development-guide.md ALWAYS
      - Follow the rules in .bob/rules/python/docstrings.md when writing docstrings
    groups:
      - read  # (read_file, fetch_instructions, search_files, list_files, list_code_definition_names)
      - edit  # (apply_diff, write_to_file)
      - command  # (execute_command)
      - mcp  # (use_mcp_tool, access_mcp_resource)
      - skill  # (use_skill)

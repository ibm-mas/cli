---
# FVT Post-Update Validation for MAS Applications
# This playbook orchestrates post-update validation for multiple MAS applications
# by calling the generic validation task for each installed application

- hosts: localhost
  any_errors_fatal: true
  vars:
    # Image Pull Policy
    image_pull_policy: "{{ lookup('env', 'IMAGE_PULL_POLICY') }}"
    mas_instance_id: "{{ lookup('env', 'MAS_INSTANCE_ID') }}"
    
    # Application configurations
    # Add or remove applications as needed for your environment
    mas_applications:
      - name: manage
        app_kind: ManageApp
        workspace_kind: ManageWorkspace
        operator_label: ibm-mas-manage

      - name: facilities
        app_kind: FacilitiesApp
        workspace_kind: FacilitiesWorkspace
        operator_label: ibm-mas-manage


  tasks:
    - name: "Validate MAS Instance ID is set"
      assert:
        that:
          - mas_instance_id is defined
          - mas_instance_id | length > 0
        fail_msg: "MAS_INSTANCE_ID environment variable must be set"

    - name: "Run post-update validation for each MAS application"
      include_tasks: ../common/fvt-post-update-app.yml
      vars:
        app_name: "{{ item.name }}"
        app_kind: "{{ item.app_kind }}"
        workspace_kind: "{{ item.workspace_kind }}"
        operator_label: "{{ item.operator_label }}"
        # Pass app-specific retry/delay settings if defined
        app_check_retries: "{{ item.app_check_retries | default(omit) }}"
        app_check_delay: "{{ item.app_check_delay | default(omit) }}"
        workspace_version_retries: "{{ item.workspace_version_retries | default(omit) }}"
        workspace_version_delay: "{{ item.workspace_version_delay | default(omit) }}"
        workspace_ready_retries: "{{ item.workspace_ready_retries | default(omit) }}"
        workspace_ready_delay: "{{ item.workspace_ready_delay | default(omit) }}"
      loop: "{{ mas_applications }}"
      loop_control:
        label: "{{ item.name }}"
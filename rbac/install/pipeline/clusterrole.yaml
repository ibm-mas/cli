---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mas:{{ mas_instance_id }}:install-pipeline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mas:{{ mas_instance_id }}:install-pipeline
subjects:
  - kind: ServiceAccount
    name: mas-{{ mas_instance_id }}-install-pipeline
    namespace: mas-{{ mas_instance_id }}-pipelines
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mas:{{ mas_instance_id }}:install-pipeline
rules:
  # ocp_verify will lookup the clusterversion to determine health of the cluster, and obtain the cluster ingres cert from the proxy/ingress
  - apiGroups:
      - config.openshift.io
    resources:
      - clusterversions
      - proxies
      - ingresses
    verbs:
      - get

  # ibm_catalogs will lookup available imagedigestmirrorsets to determine whether we are using a mirror
  - apiGroups:
      - config.openshift.io
    resources:
      - imagedigestmirrorsets
    verbs:
      - list

  # ocp_verify will query all installed catalogsources, and subscriptions
  - apiGroups:
      - operators.coreos.com
    resources:
      - catalogsources
      - subscriptions
    verbs:
      - get
      - list

  # ocp_verify will query all deployments and statefulsets to check health of the cluster
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
    verbs:
      - get
      - list

  # Used to detect whether the install is a disconnected install in various places
  - apiGroups:
      - operator.openshift.io
    resources:
      - imagecontentsourcepolicies
    verbs:
      - get

  # Monitor the progress of operator installations
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get

  # DRO install will search all namespaces for a BASCfg
  - apiGroups:
      - config.mas.ibm.com
    resources:
      - bascfgs
    verbs:
      - list

  # DRO install will attempt to get the IBM entitlement key from any namespace where it finds a BASCfg
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get

  # The CertManager install is cluster scoped
  - apiGroups:
      - operator.openshift.io
    resources:
      - certmanagers
    verbs:
      - get
      - patch

  # Pipeline needs to create namespaces for dependencies (db2, mongoce, etc.)
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - create
      - patch
      - list
  
  # Must-gather needs to read pods and their logs across all namespaces
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
  
  # Must-gather needs to read events for diagnostics
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
  
  # Must-gather needs to read services and endpoints
  - apiGroups:
      - ""
    resources:
      - services
      - endpoints
    verbs:
      - get
      - list
  
  # Must-gather needs to read configmaps across namespaces
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
  
  # Must-gather needs to read PVCs and PVs
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
      - persistentvolumes
    verbs:
      - get
      - list
  
  # Must-gather needs to read nodes for cluster diagnostics
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
  
  # Must-gather needs to read all MAS custom resources
  - apiGroups:
      - core.mas.ibm.com
      - config.mas.ibm.com
      - apps.mas.ibm.com
    resources:
      - "*"
    verbs:
      - get
      - list
  
  # Must-gather needs to read operator resources
  - apiGroups:
      - operators.coreos.com
    resources:
      - clusterserviceversions
      - installplans
    verbs:
      - get
      - list
  
  # Must-gather needs to read routes
  - apiGroups:
      - route.openshift.io
    resources:
      - routes
    verbs:
      - get
      - list
